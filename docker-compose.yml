services:
  api:
    container_name: api
    build: .
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./data:/data
    environment:
      - SQLALCHEMY_DATABASE_URL=sqlite:////data/ip_lookup.db
    command: watchmedo auto-restart --pattern="*.py" --recursive -- uvicorn main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped

